<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreeAnser | Digital Presence Agency</title>
  <meta name="description" content="Lets 24x your visibility with our professional writers! Free Digital Presence Audit available.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F5F2E6; /* Beige */
      --primary: #FF7A00; /* Orange */
      --primary-dark: #CC6200;
      --text: #1a1a1a; /* Dark text */
      --glass: rgba(255, 255, 255, 0.6);
      --glass-border: rgba(0, 0, 0, 0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; scroll-behavior: smooth; }
    
    body, html {
      background-color: var(--bg);
      color: var(--text);
      height: 100%;
      overflow: hidden;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    ::selection { background: var(--primary); color: #fff; }

    /* Scroll Container */
    #root-container {
      height: 100vh;
      overflow: hidden;
      touch-action: none;
    }

    section {
      min-height: 100vh;
      width: 100vw;
      padding: 150px 20px 60px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Ribbon */
    .ribbon {
      position: fixed; top: 0; left: 0; width: 100%; height: 40px;
      background: var(--primary); color: #ffffff;
      display: flex; align-items: center; overflow: hidden;
      z-index: 1000; font-weight: 800; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;
      text-decoration: none;
      cursor: pointer;
    }
    .ribbon:hover .ribbon-track {
      animation-play-state: paused;
    }
    .ribbon-track {
      display: flex; white-space: nowrap; animation: scroll-left 40s linear infinite;
    }
    .ribbon-item { padding: 0 2rem; position: relative; }
    .ribbon .ribbon-item::after {
      content: ''; position: absolute; bottom: -2px; left: 2rem; width: calc(100% - 4rem);
      height: 2px; background-color: #ffffff;
      transform: scaleX(0); transform-origin: left; transition: transform 0.4s ease;
    }
    .ribbon .ribbon-item:hover::after { transform: scaleX(1); }
    @keyframes scroll-left { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

    /* Nav Bar */
    .nav-pill {
      position: fixed; top: 40px; left: 0;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
      padding: 0.8rem 5%;
      display: flex; align-items: center; justify-content: space-between; gap: 2rem;
      z-index: 999; width: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
    .nav-logo { font-weight: 900; font-size: 2.2rem; color: var(--text); cursor: pointer; text-decoration: none;} /* Enlarged */
    .nav-logo span { color: var(--primary); }
    .nav-cta {
      background: var(--primary); color: #ffffff;
      padding: 0.6rem 2rem; border-radius: 50px;
      font-weight: 800; text-decoration: none; font-size: 1rem;
      white-space: nowrap;
      transition: all 0.3s ease;
    }
    .nav-cta:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255, 122, 0, 0.3); }

    /* Hero Section */
    .hero { background: radial-gradient(circle at center, #ffffff 0%, var(--bg) 70%); }
    .hero-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      max-width: 1200px;
      width: 100%;
      padding: 0 2rem;
      gap: 3rem;
      z-index: 2;
    }
    .hero-text-content { text-align: left; }
    .hero-badge {
      display: inline-block; padding: 0.4rem 1rem; border-radius: 50px;
      background: var(--glass); border: 1px solid var(--primary);
      color: var(--primary); font-weight: 600; font-size: 0.9rem; margin-bottom: 1.5rem;
      animation: float 4s ease-in-out infinite;
    }
    .hero h1 { font-size: 40px; line-height: 1.25; font-weight: 900; margin-bottom: 1.5rem; letter-spacing: -1px; }
    .hero h1 span { color: var(--primary); text-shadow: 0 0 40px rgba(255, 122, 0, 0.3); }
    .hero p { font-size: 1.2rem; color: rgba(26,26,26,0.7); max-width: 500px; line-height: 1.6; margin-bottom: 2rem; }
    .hero-image-wrapper { display: flex; justify-content: flex-end; }
    .hero-image { width: 100%; max-width: 500px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); border: 1px solid var(--glass-border); }
    
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

    /* Process Section */
    .process { background: url('data:image/svg+xml;utf8,<svg width="40" height="40" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="20" r="1" fill="rgba(0,0,0,0.03)"/></svg>'); }
    .process-container { max-width: 1200px; width: 100%; padding: 2rem; z-index: 2;}
    .section-title { font-size: 3rem; font-weight: 900; margin-bottom: 3rem; text-align: center; }
    .section-title span { color: var(--primary); }
    
    .steps-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 2rem; }
    .step-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 24px; padding: 2.5rem 2rem;
      position: relative; overflow: hidden;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      backdrop-filter: blur(10px);
    }
    .step-card:hover { transform: translateY(-10px); background: #ffffff; border-color: var(--primary); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    .step-num {
      position: absolute; bottom: -8rem; right: -1rem; top: auto;
      font-size: 10rem; font-weight: 900; font-family: sans-serif;
      color: rgba(0,0,0,0.03); line-height: 1; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 0; pointer-events: none;
    }
    .step-card:hover .step-num { color: rgba(255, 122, 0, 0.08); bottom: -1.5rem; }
    .step-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 1rem; color: var(--text); position: relative; z-index: 2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .step-desc { font-size: 1rem; color: rgba(26,26,26,0.7); line-height: 1.6; position: relative; z-index: 2;}

    /* Lead Form Section */
    .lead-section { background: radial-gradient(circle at bottom, rgba(255, 122, 0, 0.15) 0%, var(--bg) 60%); }
    .form-wrapper {
      background: var(--glass); border: 1px solid var(--glass-border);
      backdrop-filter: blur(30px); border-radius: 32px;
      padding: 3rem; max-width: 600px; width: 90%; text-align: center;
      box-shadow: 0 30px 60px rgba(0,0,0,0.15), 0 10px 20px rgba(0,0,0,0.1); /* Added strong shadow */
      margin-top: 2rem;
    }
    .form-wrapper h2 { font-size: 2.5rem; font-weight: 900; margin-bottom: 0.5rem; }
    .form-wrapper p { color: rgba(26,26,26,0.7); margin-bottom: 2.5rem; }
    
    .input-group { margin-bottom: 1.5rem; text-align: left; }
    .input-field {
      width: 100%; padding: 1.2rem 1.5rem;
      background: rgba(255,255,255,0.7); border: 1px solid var(--glass-border);
      border-radius: 16px; color: var(--text); font-size: 1rem; outline: none;
      transition: border-color 0.3s;
      -webkit-user-select: auto;
      -moz-user-select: auto;
      -ms-user-select: auto;
      user-select: auto;
    }
    .input-field:focus { border-color: var(--primary); background: #ffffff; }
    .input-field::placeholder { color: rgba(26,26,26,0.4); }

    .glow-btn {
      width: 100%; padding: 1.2rem;
      background: var(--primary); color: #ffffff;
      border: none; border-radius: 16px;
      font-size: 1.1rem; font-weight: 800; cursor: pointer;
      position: relative; overflow: hidden;
      transition: all 0.3s;
      box-shadow: 0 0 20px rgba(255, 122, 0, 0.4);
    }
    .glow-btn::after {
      content: ''; position: absolute; top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, transparent 60%);
      opacity: 0; transform: scale(0.5); transition: opacity 0.3s, transform 0.5s;
    }
    .glow-btn:hover {
      box-shadow: 0 0 40px rgba(255, 122, 0, 0.7);
      transform: translateY(-2px);
    }
    .glow-btn:hover::after { opacity: 0.3; transform: scale(1); }
    
    /* Blob background animations */
    .blob { position: absolute; filter: blur(80px); z-index: 0; opacity: 0.5; animation: orbit 10s linear infinite; pointer-events: none; }
    .blob-1 { width: 400px; height: 400px; background: rgba(255, 122, 0, 0.12); top: -100px; left: -100px; border-radius: 50%; }
    .blob-2 { width: 300px; height: 300px; background: rgba(204, 98, 0, 0.12); bottom: -50px; right: -50px; border-radius: 50%; animation-direction: reverse; }
    @keyframes orbit { 0% { transform: rotate(0deg) translate(50px) rotate(0deg); } 100% { transform: rotate(360deg) translate(50px) rotate(-360deg); } }

    /* Hero Ribbon & Portfolio */
    .hero-ribbon {
      position: absolute; bottom: 0; left: 0; width: 100%; height: 50px;
      background: rgba(255, 122, 0, 0.1); border-top: 1px solid var(--primary); border-bottom: 1px solid var(--primary);
      display: flex; align-items: center; overflow: hidden;
      z-index: 10; font-weight: 700; font-size: 1rem; color: #0474BA;
    }
    .hero-ribbon .ribbon-title { color: black; font-weight: 900; }
    .portfolio { background: radial-gradient(circle at top, #ffffff 0%, var(--bg) 70%); }
    .portfolio-container { max-width: 1200px; width: 100%; z-index: 2; text-align: center; }
    .portfolio-grid { display: flex; justify-content: center; flex-wrap: wrap; gap: 2rem; margin-top: 2rem;}
    .portfolio-card {
      background: var(--glass); border: 1px solid var(--glass-border);
      padding: 3rem; border-radius: 24px; min-width: 250px;
      backdrop-filter: blur(10px); transition: all 0.3s;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: center;
    }
    .portfolio-card:hover { transform: translateY(-10px); border-color: var(--primary); background: #ffffff; }
    .portfolio-card h3 { font-size: 1.8rem; font-weight: 800; color: var(--text); }

    /* ── Mobile: ≤900px ── */
    @media (max-width: 900px) {
      .hero-grid { grid-template-columns: 1fr; text-align: center; gap: 2rem; }
      .hero-text-content { text-align: center; }
      .hero p { margin: 0 auto 2rem; }
      .hero-image-wrapper { justify-content: center; }
      .hero-image { max-width: 380px; }
      .steps-grid { grid-template-columns: 1fr 1fr; }
    }

    /* ── Mobile: ≤600px ── */
    @media (max-width: 600px) {
      /* Top ribbon */
      .ribbon { height: 32px; font-size: 0.7rem; letter-spacing: 0.5px; }
      .ribbon-item { padding: 0 1.2rem; }

      /* Nav */
      .nav-pill {
        top: 32px; flex-direction: row; gap: 0.5rem;
        padding: 0.6rem 4%; justify-content: space-between;
      }
      .nav-logo { font-size: 1.6rem; }
      .nav-cta { padding: 0.45rem 1rem; font-size: 0.8rem; border-radius: 50px; }

      /* Section padding — accounts for smaller nav height */
      section { padding: 110px 16px 70px; min-height: 100vh; }

      /* Hero */
      .hero-grid { padding: 0; gap: 1.5rem; }
      .hero h1 { font-size: 2rem; letter-spacing: -0.5px; margin-bottom: 1rem; }
      .hero p { font-size: 1rem; margin-bottom: 1.5rem; }
      .hero-badge { font-size: 0.8rem; margin-bottom: 1rem; }
      .hero-image { max-width: 300px; border-radius: 16px; }

      /* Bottom ticker ribbon */
      .hero-ribbon { height: 40px; font-size: 0.82rem; }

      /* Process */
      .section-title { font-size: 2rem; margin-bottom: 2rem; }
      .steps-grid { grid-template-columns: 1fr; gap: 1.2rem; }
      .step-card { padding: 1.8rem 1.5rem; border-radius: 18px; }
      .step-title { font-size: 1.2rem; white-space: normal; }

      /* Lead form */
      .form-wrapper {
        width: 100%; padding: 2rem 1.4rem;
        border-radius: 24px; margin-top: 0;
      }
      .form-wrapper h2 { font-size: 1.8rem; }
      .input-field { padding: 1rem 1.2rem; font-size: 0.95rem; }
      .glow-btn { font-size: 1rem; padding: 1rem; }

      /* Portfolio */
      .portfolio-grid { gap: 1rem; }
      .portfolio-card { min-width: unset; width: 100%; padding: 2rem 1.5rem; }
      .portfolio-card h3 { font-size: 1.4rem; }
    }

    /* ── Mobile: ≤480px ── */
    @media (max-width: 480px) {
      .hero h1 { font-size: 1.75rem; }
      .hero p { font-size: 0.95rem; }
      .hero-image { max-width: 260px; }
      .nav-logo { font-size: 1.4rem; }
      .nav-cta { padding: 0.4rem 0.8rem; font-size: 0.75rem; }
      .section-title { font-size: 1.7rem; }
      .form-wrapper h2 { font-size: 1.5rem; }
    }
  </style>
  
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0?dev",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client?dev",
        "htm": "https://esm.sh/htm@3.1.1"
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module">
import { createElement, useState, useEffect, useRef } from 'react';
import { createRoot } from 'react-dom/client';
import htm from 'htm';

const html = htm.bind(createElement);

// ============================================
// COMPONENTS
// ============================================

const Ribbon = () => html`
  <a href="#lead-form" class="ribbon">
    <div class="ribbon-track">
      <span class="ribbon-item">Grab your Free Digital Audit now!</span>
      <span class="ribbon-item">Grab your Free Digital Audit now!</span>
      <span class="ribbon-item">Grab your Free Digital Audit now!</span>
      <span class="ribbon-item">Grab your Free Digital Audit now!</span>
      <span class="ribbon-item">Grab your Free Digital Audit now!</span>
      <span class="ribbon-item">Grab your Free Digital Audit now!</span>
      <span class="ribbon-item">Grab your Free Digital Audit now!</span>
      <span class="ribbon-item">Grab your Free Digital Audit now!</span>
      <span class="ribbon-item">Grab your Free Digital Audit now!</span>
      <span class="ribbon-item">Grab your Free Digital Audit now!</span>
    </div>
  </a>
`;

const Nav = () => html`
  <nav class="nav-pill">
    <a href="#hero" class="nav-logo">Free<span>Anser</span></a>
    <a href="#lead-form" class="nav-cta">Free Digital Presence Audit!</a>
  </nav>
`;

const Hero = () => html`
  <section id="hero" class="hero">
    <div class="blob blob-1"></div>
    <div class="hero-grid">
      <div class="hero-text-content">
        <div class="hero-badge">⚡ Maximum ROI</div>
        <h1>Lets <span>24x</span> your visibility<br/>with our professional writers!</h1>
        <p>Transform your brand with ultra-optimized content, stunning aesthetics, and a data-driven path to market dominance.</p>
      </div>
      <div class="hero-image-wrapper">
        <img src="writer.png" alt="Professional Writer" class="hero-image" />
      </div>
    </div>
    <div class="hero-ribbon">
      <div class="ribbon-track hero-track">
        <span class="ribbon-item"><span class="ribbon-title">Shiple (SaaS):</span> We need content for our Landing Page</span>
        <span class="ribbon-item"><span class="ribbon-title">Naveen (Campgemini):</span> I want writer for my LinkedIn</span>
        <span class="ribbon-item"><span class="ribbon-title">Founder (EdTech):</span> Optimise my website SEO for visibility</span>
        <span class="ribbon-item"><span class="ribbon-title">Founder (Digital Marketing):</span> I need Ghost writer for 30 Blogs</span>
        <span class="ribbon-item"><span class="ribbon-title">Founder (FinTech):</span> We want Youtube scripts and SEO</span>
        <span class="ribbon-item"><span class="ribbon-title">Shiple (SaaS):</span> We need content for our Landing Page</span>
        <span class="ribbon-item"><span class="ribbon-title">Naveen (Campgemini):</span> I want writer for my LinkedIn</span>
        <span class="ribbon-item"><span class="ribbon-title">Founder (EdTech):</span> Optimise my website SEO for visibility</span>
        <span class="ribbon-item"><span class="ribbon-title">Founder (Digital Marketing):</span> I need Ghost writer for 30 Blogs</span>
        <span class="ribbon-item"><span class="ribbon-title">Founder (FinTech):</span> We want Youtube scripts and SEO</span>
      </div>
    </div>
  </section>
`;

const Process = () => {
  const steps = [
    { num: "01", title: "Digital Presence Audit", desc: "Submit the form" },
    { num: "02", title: "Get the Report", desc: "What's wrong and what can be worked upon" },
    { num: "03", title: "Custom Quote", desc: "Custom plans that are always within your budget" },
    { num: "04", title: "Strategic Roadmap", desc: "Specialised roadmap and Execution for maximum results" },
  ];

  return html`
    <section id="process" class="process">
      <div class="process-container">
        <h2 class="section-title">The <span>Fast</span> 4-Step Process</h2>
        <div class="steps-grid">
          ${steps.map((step, i) => html`
            <div class="step-card" key=${i}>
              <div class="step-num">${step.num}</div>
              <h3 class="step-title">${step.title}</h3>
              <p class="step-desc">${step.desc}</p>
            </div>
          `)}
        </div>
      </div>
    </section>
  `;
};

const LeadForm = () => {
  const [email, setEmail] = useState('');
  const [link, setLink] = useState('');

  const handleSubmit = (e) => {
    e.preventDefault();
    alert(`Booked Audit for ${email} | Link: ${link}`);
  };

  return html`
    <section id="lead-form" class="lead-section">
      <div class="blob blob-2"></div>
      <div class="form-wrapper">
        <h2>Free Digital Presence Audit</h2>
        <p>(no Strings attached)</p>
        <form onSubmit=${handleSubmit}>
          <div class="input-group">
            <input 
              type="email" 
              class="input-field" 
              placeholder="Your Email Address" 
              value=${email} 
              onInput=${e => setEmail(e.target.value)} 
              required 
            />
          </div>
          <div class="input-group">
            <input 
              type="text" 
              class="input-field" 
              placeholder="Business link (Website / Instagram / Google profile)" 
              value=${link} 
              onInput=${e => setLink(e.target.value)} 
              required 
            />
          </div>
          <button type="submit" class="glow-btn">Book My Free Audit</button>
        </form>
      </div>
    </section>
  `;
};

const Portfolio = () => html`
  <section id="portfolio" class="portfolio">
    <div class="portfolio-container">
      <h2 class="section-title">Our Writers <span>Portfolio</span></h2>
      <div class="portfolio-grid">
        <div class="portfolio-card">
          <h3>Geeks for Geeks</h3>
        </div>
        <div class="portfolio-card">
          <h3>Scaler</h3>
        </div>
        <div class="portfolio-card">
          <h3>Ajit Bhavan</h3>
        </div>
      </div>
    </div>
  </section>
`;

// ============================================
// ROOT APP COMPONENT
// ============================================

const App = () => {
  const [activeIndex, setActiveIndex] = useState(0);
  const isScrolling = useRef(false);
  const touchStartY = useRef(0);
  const totalSections = 4; 

  useEffect(() => {
    const handleAnchor = (e) => {
      const target = e.target.closest('a');
      if (target && target.hash) {
        if (target.hash === '#hero') { e.preventDefault(); setActiveIndex(0); }
        else if (target.hash === '#lead-form') { e.preventDefault(); setActiveIndex(2); }
      }
    };
    document.addEventListener('click', handleAnchor);
    return () => document.removeEventListener('click', handleAnchor);
  }, []);

  useEffect(() => {
    const handleWheel = (e) => {
      if (Math.abs(e.deltaY) < 10) return; 
      if (isScrolling.current) return;
      isScrolling.current = true;
      if (e.deltaY > 0 && activeIndex < totalSections - 1) setActiveIndex(prev => prev + 1);
      else if (e.deltaY < 0 && activeIndex > 0) setActiveIndex(prev => prev - 1);
      setTimeout(() => { isScrolling.current = false; }, 1000);
    };

    const handleTouchStart = (e) => { touchStartY.current = e.touches[0].clientY; };
    const handleTouchMove = (e) => {
      if (isScrolling.current) return;
      const touchY = e.touches[0].clientY;
      const diff = touchStartY.current - touchY;
      if (Math.abs(diff) < 30) return;
      isScrolling.current = true;
      if (diff > 0 && activeIndex < totalSections - 1) setActiveIndex(prev => prev + 1);
      else if (diff < 0 && activeIndex > 0) setActiveIndex(prev => prev - 1);
      setTimeout(() => { isScrolling.current = false; }, 1000);
    };

    window.addEventListener('wheel', handleWheel, { passive: false });
    window.addEventListener('touchstart', handleTouchStart, { passive: false });
    window.addEventListener('touchmove', handleTouchMove, { passive: false });
    return () => {
      window.removeEventListener('wheel', handleWheel);
      window.removeEventListener('touchstart', handleTouchStart);
      window.removeEventListener('touchmove', handleTouchMove);
    };
  }, [activeIndex]);

  return html`
    <div id="root-container">
      <${Ribbon} />
      <${Nav} />
      <div 
        style=${{ 
          transform: 'translateY(-' + activeIndex * 100 + 'vh)', 
          transition: 'transform 0.8s cubic-bezier(0.65, 0, 0.35, 1)',
          willChange: 'transform',
          height: '400vh'
        }}
      >
        <${Hero} />
        <${Process} />
        <${LeadForm} />
        <${Portfolio} />
      </div>
    </div>
  `;
};

// ============================================
// RENDER
// ============================================
const container = document.getElementById('root');
const root = createRoot(container);
root.render(html`<${App} />`);
  </script>
</body>
</html>
