<!DOCTYPE html>
<html lang="en">

<head>

    content="Lets 24x your visibility with our professional writers. Get a Free Digital Presence Audit now.">

  <script type="application/ld+json">

    "@context": "https://schema.org",

      "@type": "OfferCatalog",

      "itemListElement": [
        {

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" fetchpriority="high"
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" media="all">
  
  <style>
    :root {
      --bg: #F5F2E6;
      --primary: #FF7A00;
      --primary-dark: #CC6200;
      --text: #1a1a1a;
      --glass: rgba(255, 255, 255, 0.65);
      --glass-border: rgba(0, 0, 0, 0.08);
      --ribbon-h: 36px;
      --nav-h: 64px;
      --header-h: calc(var(--ribbon-h) + var(--nav-h));
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Outfit', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body, html {
      background-color: var(--bg);
      color: var(--text);
      height: 100%;
      width: 100%;
      overflow: hidden;
      touch-action: none;
    }

    /* ── Layout Containers ── */
    #root-container {
      height: 100dvh;
      width: 100vw;
      overflow: hidden;
      position: relative;
    }

    section {
      height: 100dvh;
      width: 100vw;
      padding: calc(var(--header-h) + 10px) clamp(1rem, 5vw, 2rem) 20px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background-image: radial-gradient(circle, transparent 40%, rgba(0, 0, 0, 0.05) 100%);
    }

    /* ── Navigation ── */
    .ribbon {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: var(--ribbon-h);
      background: var(--primary);
      color: #fff;
      display: flex;
      align-items: center;
      z-index: 1000;
      font-weight: 800;
      font-size: 0.75rem;
      text-transform: uppercase;
      text-decoration: none;
      overflow: hidden;
    }

    .ribbon-track {
      display: flex;
      white-space: nowrap;
      animation: scroll-left 30s linear infinite;
    }

    @keyframes scroll-left {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .ribbon-item { padding: 0 1.5rem; }

    .nav-pill {
      position: fixed;
      top: var(--ribbon-h);
      left: 0;
      width: 100%;
      height: var(--nav-h);
      background: rgba(255, 252, 242, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--glass-border);
      padding: 0 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 999;
    }

    .nav-logo {
      font-weight: 900;
      font-size: 1.5rem;
      color: var(--text);
      text-decoration: none;
    }

    .nav-logo span { color: var(--primary); }

    .nav-cta {
      background: var(--primary);
      color: #fff;
      padding: 0.5rem 0.8rem;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.7rem;
      text-decoration: none;
      box-shadow: 0 4px 12px rgba(255, 122, 0, 0.2);
    }

    /* ── Hero Section ── */
    .hero-grid {
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100%;
      width: 100%;
      max-width: 500px;
      gap: 1dvh;
    }

    .hero h1 {
      font-size: clamp(1.6rem, 8vw, 2.4rem);
      line-height: 1.1;
      font-weight: 900;
      margin-bottom: 0.5rem;
    }

    .hero h1 span { color: var(--primary); }

    .hero p {
      font-size: clamp(0.9rem, 4vw, 1.05rem);
      color: rgba(0, 0, 0, 0.7);
      line-height: 1.4;
      margin-bottom: 1rem;
      padding: 0 10px;
    }

    .hero-image-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }

    .hero-image {
      max-height: 35dvh;
      max-width: 90%;
      object-fit: contain;
      image-rendering: -webkit-optimize-contrast;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));
    }

    .hero-ribbon {
      width: 100vw;
      margin: 0 -1rem;
      height: 40px;
      background: rgba(255, 122, 0, 0.08);
      border-top: 1px solid var(--primary);
      border-bottom: 1px solid var(--primary);
      display: flex;
      align-items: center;
      font-size: 0.8rem;
      color: #0474BA;
      overflow: hidden;
    }

    /* ── Process Cards ── */
    .steps-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
      margin-top: 1rem;
    }

    .step-card {
      background: #fff;
      padding: 1rem;
      border-radius: 16px;
      border: 1px solid var(--glass-border);
      text-align: left;
      position: relative;
      overflow: hidden;
    }

    .step-title { font-size: 0.85rem; font-weight: 800; margin-bottom: 4px; }
    .step-desc { font-size: 0.75rem; color: #666; }
    .step-num { 
        position: absolute; right: -5px; bottom: -10px; 
        font-size: 3rem; font-weight: 900; color: rgba(0,0,0,0.03); 
    }

    /* ── Form ── */
    .form-wrapper {
      background: #fff;
      padding: 1.5rem;
      border-radius: 24px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }

    .input-field {
      width: 100%;
      padding: 0.8rem 1rem;
      margin-bottom: 12px;
      border-radius: 12px;
      border: 1px solid #ddd;
      font-size: 1rem;
      -webkit-appearance: none;
    }

    .glow-btn {
      width: 100%;
      padding: 1rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-weight: 800;
      font-size: 1rem;
    }

    /* ── Portfolio ── */
    .portfolio-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }

    .portfolio-card {
      background: #fff;
      padding: 1.2rem;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      font-weight: 800;
    }

    /* ── Responsive Refinements (380px) ── */
    @media (max-width: 400px) {
      :root {
        --nav-h: 56px;
      }
      .hero h1 { font-size: 1.8rem; }
      .hero p { font-size: 0.9rem; }
      .nav-logo { font-size: 1.3rem; }
      .nav-cta { font-size: 0.65rem; padding: 0.4rem 0.6rem; }
      .steps-grid { grid-template-columns: 1fr; }
    }

    .blob {
      position: absolute;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(255,122,0,0.15) 0%, transparent 70%);
      filter: blur(40px);
      z-index: -1;
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "preact": "https://esm.sh/preact@10.19.2",
        "preact/hooks": "https://esm.sh/preact@10.19.2/hooks",
        "htm": "https://esm.sh/htm@3.1.1/preact?external=preact"
      }
    }
  </script>
</head>

<body>
  <div id="root"></div>

  <script type="module">
    import { render } from 'preact';
    import { useState, useEffect, useRef } from 'preact/hooks';
    import { html } from 'htm';

    const Ribbon = () => html`
      <div class="ribbon">
        <div class="ribbon-track">
          ${[1, 2, 3, 4, 5].map(() => html`
            <span class="ribbon-item">Grab your Free Digital Audit now! 🚀</span>
          `)}
        </div>
      </div>
    `;

    const Nav = () => html`
      <nav class="nav-pill">
        <a href="#" class="nav-logo">Free<span>Anser</span></a>
        <a href="#lead-form" class="nav-cta">Free Audit!</a>
      </nav>
    `;

    const Hero = () => html`
      <section id="hero" class="hero">
        <div class="blob" style="top: 10%; left: -10%;"></div>
        <div class="hero-grid">
          <div class="hero-text-content">
            <h1>Let's <span>24x</span> your visibility!</h1>
            <p>Transform your brand with professional writing and data-driven content strategies.</p>
          </div>
          <div class="hero-image-wrapper">
            <img src="writer.png" alt="Writer" class="hero-image" />
          </div>
        </div>
        <div class="hero-ribbon">
          <div class="ribbon-track">
            <span class="ribbon-item"><b>Shiple:</b> Content for Landing Page</span>
            <span class="ribbon-item"><b>Naveen:</b> LinkedIn Strategy</span>
            <span class="ribbon-item"><b>Founder:</b> SEO Optimization</span>
          </div>
        </div>
      </section>
    `;

    const Process = () => html`
      <section id="process">
        <h2 style="font-weight:900; margin-bottom: 1rem;">The <span>Fast</span> Process</h2>
        <div class="steps-grid">
          <div class="step-card"><div class="step-num">1</div><h3 class="step-title">Submit Audit</h3><p class="step-desc">Fill the form</p></div>
          <div class="step-card"><div class="step-num">2</div><h3 class="step-title">Get Report</h3><p class="step-desc">Analysis sent</p></div>
          <div class="step-card"><div class="step-num">3</div><h3 class="step-title">Custom Quote</h3><p class="step-desc">Budget-friendly</p></div>
          <div class="step-card"><div class="step-num">4</div><h3 class="step-title">Execution</h3><p class="step-desc">Maximum results</p></div>
        </div>
      </section>
    `;

    const Form = ({ onComplete }) => html`
      <section id="lead-form">
        <div class="form-wrapper">
          <h2 style="font-weight:900; margin-bottom: 0.5rem;">Free <span>Presence</span> Audit</h2>
          <p style="font-size: 0.8rem; margin-bottom: 1rem;">(No strings attached)</p>
          <input type="email" class="input-field" placeholder="Email Address" />
          <input type="text" class="input-field" placeholder="Website / Instagram Link" />
          <button class="glow-btn" onClick=${onComplete}>Get Free Audit</button>
        </div>
      </section>
    `;

    const Portfolio = () => html`
      <section id="portfolio">
        <h2 style="font-weight:900; margin-bottom: 1.5rem;">Our <span>Portfolio</span></h2>
        <div class="portfolio-grid">
          <div class="portfolio-card">Geeks for Geeks</div>
          <div class="portfolio-card">Scaler Academy</div>
          <div class="portfolio-card">Ajit Bhavan</div>
        </div>
      </section>
    `;

    const App = () => {
      const [idx, setIdx] = useState(0);
      const [isScrolling, setIsScrolling] = useState(false);
      const touchStart = useRef(0);
      const sections = 4;

      const handleScroll = (dir) => {
        if (isScrolling) return;
        setIsScrolling(true);
        if (dir > 0 && idx < sections - 1) setIdx(idx + 1);
        else if (dir < 0 && idx > 0) setIdx(idx - 1);
        setTimeout(() => setIsScrolling(false), 800);
      };

      useEffect(() => {
        const onWheel = (e) => { e.preventDefault(); handleScroll(e.deltaY); };
        const onTouchStart = (e) => { touchStart.current = e.touches[0].clientY; };
        const onTouchMove = (e) => {
          e.preventDefault();
          const diff = touchStart.current - e.touches[0].clientY;
          if (Math.abs(diff) > 40) { handleScroll(diff); touchStart.current = e.touches[0].clientY; }
        };
        window.addEventListener('wheel', onWheel, { passive: false });
        window.addEventListener('touchstart', onTouchStart, { passive: false });
        window.addEventListener('touchmove', onTouchMove, { passive: false });
        return () => {
          window.removeEventListener('wheel', onWheel);
          window.removeEventListener('touchstart', onTouchStart);
          window.removeEventListener('touchmove', onTouchMove);
        };
      }, [idx, isScrolling]);

      return html`
        <div id="root-container">
          <${Ribbon} />
          <${Nav} />
          <div style=${{
            transform: \`translateY(-\${idx * 100}dvh)\`,
            transition: 'transform 0.8s cubic-bezier(0.65, 0, 0.35, 1)',
            height: '100%'
          }}>
            <${Hero} />
            <${Process} />
            <${Form} onComplete=${() => alert('Audit Requested!')} />
            <${Portfolio} />
          </div>
        </div>
      `;
    };

    render(html`<${App} />`, document.getElementById('root'));
  </script>
</body>
</html>
